---
- name: Update and maintain system
  hosts: all
  become: yes
  vars_files:
    - ../vars/basic.yml

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade system packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Clean temporary files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/*
        - /var/tmp/*

    - name: Clean old logs
      find:
        paths: /var/log
        patterns: "*.log"
        age: "30d"
        state: absent
      ignore_errors: yes

    - name: Reboot system if required
      reboot:
        msg: "Reboot after system update"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: reboot_required | default(false)
