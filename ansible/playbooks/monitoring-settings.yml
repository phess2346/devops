---
- name: Deploy monitoring stack to Kubernetes
  hosts: localhost
  connection: local
  vars_files:
    - ../vars/basic.yml
    - ../vars/secrets.yml

  tasks:
    - name: Check Kubernetes connection
      command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Create monitoring namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ monitoring_namespace }}"
        state: present

    - name: Deploy Prometheus Stack with Helm
      kubernetes.core.helm:
        name: prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "{{ prometheus_stack_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        values:
          defaultRules:
            create: true
          alertmanager:
            enabled: true
          grafana:
            enabled: true
            adminPassword: "{{ grafana_admin_password }}"
          prometheus:
            enabled: true
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: "{{ prometheus_volume_size }}"

    - name: Wait for monitoring pods to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ monitoring_namespace }}"
        label_selector: "app.kubernetes.io/name=grafana"
      register: grafana_pods
      until: grafana_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 10
      delay: 30
