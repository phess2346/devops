---
- name: Развертывание стека мониторинга в Kubernetes
  hosts: localhost
  connection: local
  vars_files:
    - ../vars/основные.yml
    - ../vars/секреты.yml

  tasks:
    - name: Проверка подключения к Kubernetes
      command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Создание namespace для мониторинга
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ namespace_мониторинга }}"
        state: present

    - name: Создание secret для Grafana
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: grafana-admin
        namespace: "{{ namespace_мониторинга }}"
        string_data:
          admin-password: "{{ grafana_admin_password }}"
          admin-user: "{{ grafana_admin_user }}"

    - name: Развертывание Prometheus Stack с Helm
      kubernetes.core.helm:
        name: prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "{{ версия_prometheus_stack }}"
        release_namespace: "{{ namespace_мониторинга }}"
        values:
          defaultRules:
            create: true
          alertmanager:
            enabled: true
            service:
              type: NodePort
          grafana:
            enabled: true
            service:
              type: NodePort
            adminPassword: "{{ grafana_admin_password }}"
          prometheus:
            enabled: true
            service:
              type: NodePort
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: "{{ prometheus_volume_size }}"

    - name: Развертывание Loki для логов
      kubernetes.core.helm:
        name: loki
        chart_ref: grafana/loki
        chart_version: "{{ версия_loki }}"
        release_namespace: "{{ namespace_мониторинга }}"
        values:
          loki:
            config:
              table_manager:
                retention_deletes_enabled: true
                retention_period: "{{ loki_retention_period }}"

    - name: Развертывание Prometheus Blackbox Exporter
      kubernetes.core.helm:
        name: blackbox-exporter
        chart_ref: prometheus-community/prometheus-blackbox-exporter
        chart_version: "{{ версия_blackbox_exporter }}"
        release_namespace: "{{ namespace_мониторинга }}"

    - name: Ожидание готовности Pods мониторинга
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ namespace_мониторинга }}"
        label_selector:
          - "app.kubernetes.io/name=grafana"
      register: grafana_pods
      until: grafana_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 10
      delay: 30

  post_tasks:
    - name: Получение информации о сервисах мониторинга
      command: kubectl get svc -n {{ namespace_мониторинга }}
      register: monitoring_services

    - name: Вывод информации о доступе к мониторингу
      debug:
        msg: |
          Стек мониторинга развернут!
          
          Для доступа к сервисам выполните:
          kubectl port-forward -n {{ namespace_мониторинга }} service/grafana 3000:3000
          kubectl port-forward -n {{ namespace_мониторинга }} service/prometheus-stack-kube-prom-prometheus 9090:9090
          
          Или используйте NodePort:
          kubectl get svc -n {{ namespace_мониторинга }} | grep NodePort
