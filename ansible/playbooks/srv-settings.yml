---
- name: Configure srv server with monitoring and CI/CD tools
  hosts: srv_servers
  become: yes
  vars_files:
    - ../vars/basic.yml
    - ../vars/secrets.yml

  roles:
    - role: basic-settings
    - role: docker

  tasks:
    - name: Create directory structure
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ main_user }}"
        group: "{{ main_group }}"
        mode: '0755'
      loop:
        - "{{ monitoring_directory }}"
        - "{{ monitoring_directory }}/prometheus"
        - "{{ monitoring_directory }}/grafana/provisioning"
        - "{{ monitoring_directory }}/grafana/dashboards"
        - "{{ ci_cd_directory }}"
        - "{{ logs_directory }}"

    - name: Deploy Prometheus configuration
      copy:
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets: ['localhost:9100']
        dest: "{{ monitoring_directory }}/prometheus/prometheus.yml"
        owner: "{{ main_user }}"
        group: "{{ main_group }}"

    - name: Deploy monitoring stack docker-compose
      template:
        src: monitoring/docker-compose.yml.j2
        dest: "{{ monitoring_directory }}/docker-compose.yml"
        owner: "{{ main_user }}"
        group: "{{ main_group }}"

    - name: Start monitoring stack
      community.docker.docker_compose:
        project_src: "{{ monitoring_directory }}"
        state: present

    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm kubectl

    - name: Install yc CLI
      shell: |
        curl -s https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        /home/{{ main_user }}/yandex-cloud/bin/yc components update
      args:
        executable: /bin/bash

    - name: Add yc to PATH
      lineinfile:
        path: "/home/{{ main_user }}/.bashrc"
        line: 'export PATH=$PATH:/home/{{ main_user }}/yandex-cloud/bin'
        create: yes

    - name: Configure firewall for monitoring services
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop: "{{ allowed_ports }}"

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted

    - name: restart monitoring
      shell: cd {{ monitoring_directory }} && docker-compose restart
