---
- name: Configure CI/CD tools on srv server
  hosts: srv_servers
  become: yes
  vars_files:
    - ../vars/basic.yml
    - ../vars/secrets.yml

  tasks:
    - name: Install Git
      apt:
        name: git
        state: present

    - name: Create CI/CD user
      user:
        name: "{{ ci_cd_user }}"
        group: "{{ ci_cd_group }}"
        shell: /bin/bash
        create_home: yes

    - name: Create CI/CD directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ci_cd_user }}"
        group: "{{ ci_cd_group }}"
        mode: '0755'
      loop:
        - "{{ ci_cd_directory }}/builds"
        - "{{ ci_cd_directory }}/cache"
        - "{{ ci_cd_directory }}/logs"

    - name: Install GitLab Runner
      shell: |
        curl -L "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh" | sudo bash
        apt-get install gitlab-runner
      args:
        executable: /bin/bash

    - name: Register GitLab Runner (if token provided)
      community.general.gitlab_runner:
        coordinator: "https://gitlab.com"
        registration_token: "{{ gitlab_runner_token }}"
        description: "Kubernetes Runner"
        tags:
          - k8s
          - docker
        state: present
      when: gitlab_runner_token is defined

    - name: Configure firewall for CI/CD services
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "8080"
        - "5000"
