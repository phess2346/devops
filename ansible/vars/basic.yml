---
# Software versions
docker_compose_version: "v2.24.0"
kubectl_version: "1.25.0"
helm_version: "3.12.0"

# Monitoring settings
prometheus_stack_version: "46.8.0"
loki_version: "5.5.0"
blackbox_exporter_version: "5.3.1"
monitoring_namespace: "monitoring"
prometheus_volume_size: "50Gi"
loki_retention_period: "720h"

# Docker settings
docker_storage_driver: "overlay2"
docker_log_max_size: "100m"
docker_log_max_files: "3"

# Security settings
fail2ban_ban_time: "3600"
fail2ban_max_retry: "3"
ufw_default_policy: "deny"

# Allowed ports
allowed_ports:
  - { port: '22', proto: 'tcp' }
  - { port: '80', proto: 'tcp' }
  - { port: '443', proto: 'tcp' }
  - { port: '3000', proto: 'tcp' }
  - { port: '9090', proto: 'tcp' }
  - { port: '9100', proto: 'tcp' }
