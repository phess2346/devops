---
# Настройки сервера srv
project_directory: /opt/projects
logs_directory: /var/log/applications
backups_directory: /opt/backups
scripts_directory: /opt/scripts

# Настройки мониторинга
monitoring_directory: /opt/monitoring
grafana_port: 3000
prometheus_port: 9090
node_exporter_port: 9100

# Настройки CI/CD
ci_cd_directory: /opt/ci-cd
ci_cd_user: runner
ci_cd_group: runner

# Версии ПО
docker_compose_version: "v2.24.0"
grafana_version: "10.0.0"
prometheus_version: "2.47.0"
node_exporter_version: "1.6.1"
