---
# Основные настройки для всех хостов
main_user: ubuntu
main_group: ubuntu

# Настройки времени
timezone: Europe/Moscow
ntp_servers:
  - pool.ntp.org
  - ntp.yandex.ru

# Настройки SSH
ssh_port: 22
ssh_settings:
  - PasswordAuthentication no
  - PermitRootLogin no
  - ClientAliveInterval 300
  - ClientAliveCountMax 2

# Базовые пакеты
base_packages:
  - curl
  - wget
  - gnupg
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - git
  - htop
  - tree
  - jq
  - vim
  - ufw
  - fail2ban
  - unattended-upgrades

# Настройки обновлений
auto_updates: true
auto_reboot: false
